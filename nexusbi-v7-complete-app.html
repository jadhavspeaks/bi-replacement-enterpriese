// ═══ LOD PARSER (live validation in editor) ═══
function parseLOD(raw){
  const errors=[];const trimmed=(raw||'').trim();
  if(!trimmed.startsWith('{')||!trimmed.endsWith('}'))return{errors:['LOD must be wrapped in { }'],expr:null};
  const inner=trimmed.slice(1,-1).trim();
  let depth=0,colonIdx=-1;
  for(let i=0;i<inner.length;i++){if(inner[i]==='['||inner[i]==='(')depth++;else if(inner[i]===']'||inner[i]===')')depth--;else if(inner[i]===':'&&depth===0){colonIdx=i;break}}
  if(colonIdx===-1)return{errors:['Missing ":" separator'],expr:null};
  const dimsSec=inner.slice(0,colonIdx).trim();
  const aggSec=inner.slice(colonIdx+1).trim();
  const typeMatch=dimsSec.match(/^(FIXED|INCLUDE|EXCLUDE)\b/i);
  if(!typeMatch)return{errors:['Must start with FIXED, INCLUDE, or EXCLUDE'],expr:null};
  const type=typeMatch[1].toLowerCase();
  const afterType=dimsSec.slice(typeMatch[0].length).trim();
  const dims=[];const re=/\[([^\]]+)\]|([a-zA-Z_][a-zA-Z0-9_.]*)/g;let m;
  while((m=re.exec(afterType))!==null)dims.push((m[1]||m[2]).trim());
  if(dims.length===0&&type!=='exclude')errors.push('At least one dimension required');
  const filterMatch=aggSec.match(/\bWHERE\s+(.+)$/i);
  const aggPart=filterMatch?aggSec.slice(0,aggSec.length-filterMatch[0].length).trim():aggSec;
  const aggMatch=aggPart.match(/^(\w+)\s*\(\s*(.+?)\s*\)\s*$/);
  if(!aggMatch)return{errors:['Aggregation must be AGG(field)'],expr:null};
  const aggName=aggMatch[1].toUpperCase();
  const validAggs=['SUM','AVG','COUNT','COUNTD','MIN','MAX','MEDIAN'];
  if(!validAggs.includes(aggName))errors.push(`Invalid aggregation "${aggName}". Use: ${validAggs.join(', ')}`);
  const fieldRaw=aggMatch[2].trim();
  const field=fieldRaw.startsWith('[')&&fieldRaw.endsWith(']')?fieldRaw.slice(1,-1):fieldRaw;
  if(!field)errors.push('Measure field required');
  return{errors,expr:{type,dimensions:dims,aggregation:aggName,measureField:field,filter:filterMatch?filterMatch[1].trim():null}};
}

    {type:'dual_axis',icon:'≡',name:'Dual-Axis',score:meas>=2&&temporal?.8:.3,reason:'2 measures, shared axis'},
    {type:'sparkline',icon:'〜',name:'Sparkline',score:temporal&&meas===1?.65:.2,reason:'Inline trend'},
    {type:'text',icon:'📝',name:'Text',score:.2,reason:'Static'}
  ];
  return rules.sort((a,b)=>b.score-a.score);
}

// ═══ CHART HELPERS ═══
function svgBar(cats,vals,color,w,h){
  const mx=Math.max(...vals.filter(v=>v!=null))||1,pad=40,bw=Math.min(36,(w-pad-10)/cats.length*.7),gap=(w-pad-10)/cats.length;
  let bars='',labels='';
  cats.forEach((c,i)=>{const v=vals[i]||0;const bh=(v/mx)*(h-50);const x=pad+i*gap+gap/2-bw/2;const y=h-30-bh;bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="2"><title>${c}: ${v}</title></rect>`;labels+=`<text x="${pad+i*gap+gap/2}" y="${h-10}" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui">${c}</text>`;});
  const gr=[0,.25,.5,.75,1].map(p=>{const y=h-30-(h-50)*p;const v=Math.round(mx*p);return`<line x1="${pad}" y1="${y}" x2="${w}" y2="${y}" stroke="#e5e7eb" stroke-width=".5"/><text x="${pad-4}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9" font-family="system-ui">${v>=1000?(v/1000).toFixed(0)+'K':v}</text>`}).join('');
  return`<svg class="ch" viewBox="0 0 ${w} ${h}">${gr}${bars}${labels}</svg>`;
}
function svgLine(cats,vals,color,w,h,forecast){
  const allVals=[...(vals||[]),...(forecast||[])].filter(v=>v!=null);
  const mx=Math.max(...allVals)||1,mn=Math.min(...allVals);
  const pad=45,ch=h-55;
  const cvt=(v,i)=>({x:pad+i*((w-pad-10)/(cats.length-1||1)),y:15+ch-(((v-mn)/(mx-mn||1))*ch)});
  const actualPts=cats.map((c,i)=>vals[i]!=null?cvt(vals[i],i):null).filter(Boolean);
  const actualPoly=actualPts.map(p=>`${p.x},${p.y}`).join(' ');
  let forecastPoly='',confBand='';
  if(forecast){
    const fcPts=cats.map((c,i)=>forecast[i]!=null?cvt(forecast[i],i):null).filter(Boolean);
    forecastPoly=fcPts.map(p=>`${p.x},${p.y}`).join(' ');
    if(fcPts.length>1){
      const upper=fcPts.map(p=>`${p.x},${p.y-18}`).join(' ');
      const lower=fcPts.map(p=>`${p.x},${p.y+18}`).reverse().join(' ');
      confBand=`<polygon points="${upper} ${lower}" fill="${color}" opacity=".12"/>`;
    }
  }
  const labels=cats.map((c,i)=>`<text x="${pad+i*((w-pad-10)/(cats.length-1||1))}" y="${h-10}" text-anchor="middle" fill="#6b7280" font-size="10">${c}</text>`).join('');
  const dots=actualPts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5"/>`).join('');
  const gr=[0,.25,.5,.75,1].map(p=>{const y=15+ch-ch*p;const v=(mn+(mx-mn)*p).toFixed(0);return`<line x1="${pad}" y1="${y}" x2="${w}" y2="${y}" stroke="#e5e7eb" stroke-width=".5"/><text x="${pad-4}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9">${v}</text>`}).join('');
  return`<svg class="ch" viewBox="0 0 ${w} ${h}">${gr}${confBand}<polyline points="${actualPoly}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>${forecastPoly?`<polyline points="${forecastPoly}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="4,3" opacity=".6"/>`:''}${dots}${labels}${forecast?`<text x="${w-70}" y="18" fill="${color}" font-size="9" font-family="monospace">━━ actual  - - - forecast</text>`:''}</svg>`;
}
function svgSparkline(vals,color){
  const w=100,h=28;const mx=Math.max(...vals),mn=Math.min(...vals);
  const pts=vals.map((v,i)=>`${i*(w/(vals.length-1))},${h-(((v-mn)/(mx-mn||1))*h)}`).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100px;height:28px"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
}
function svgMap(regions){
  // Fake world map: boxes for regions with heatmap fill
  const w=500,h=260;
  const regionData=[
    {nm:'Americas',x:30,y:60,w:140,h:150,val:1560,cl:'#1e40af'},
    {nm:'EMEA',x:210,y:50,w:130,h:130,val:980,cl:'#3b82f6'},

    {nm:'ANZ',x:370,y:170,w:80,h:50,val:320,cl:'#93c5fd'}
  ];
  const maxV=Math.max(...regionData.map(r=>r.val));
  const shapes=regionData.map(r=>{

    const fill=`rgba(30,64,175,${0.2+intensity*.7})`;
    return`<g><rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${fill}" stroke="#1e40af" stroke-width="1" rx="8"/><text x="${r.x+r.w/2}" y="${r.y+r.h/2-4}" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">${r.nm}</text><text x="${r.x+r.w/2}" y="${r.y+r.h/2+12}" text-anchor="middle" font-size="11" fill="#fff" font-family="monospace">$${(r.val/1000).toFixed(1)}M</text></g>`;
  }).join('');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:240px">${shapes}</svg>`;
}
function svgDensity(){
  // 24x16 grid with gradient
  const w=500,h=240,cols=24,rows=16;const cw=w/cols,ch=h/rows;
  let cells='';
  for(let x=0;x<cols;x++){for(let y=0;y<rows;y++){
    const dx=x-12,dy=y-8;
    const d1=Math.exp(-((dx+3)**2+dy**2)/30);
    const d2=Math.exp(-((dx-5)**2+(dy-2)**2)/25);
    const density=Math.min(1,d1+d2*0.7);
    const colors=['#440154','#3b528b','#21918c','#5ec962','#fde725'];
    const ci=Math.min(4,Math.floor(density*5));
    cells+=`<rect x="${x*cw}" y="${y*ch}" width="${cw}" height="${ch}" fill="${colors[ci]}" opacity="${0.3+density*.7}"/>`;
  }}
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:240px">${cells}</svg>`;
}
function svgHist(bins){
  const mx=Math.max(...bins.map(b=>b.count))||1;
  return bins.map(b=>`<div class="hist-bar" style="height:${(b.count/mx)*100}%" title="${b.lower.toFixed(0)}–${b.upper.toFixed(0)}: ${b.count}"></div>`).join('');
}

function compileLodToSQL(expr,wbId){
  if(!expr||!expr.type)return'';const cube='ORDERS';const alias=`lod_${Date.now().toString(36)}`;
  const aggMap={SUM:'SUM',AVG:'AVG',COUNT:'COUNT',COUNTD:'COUNT(DISTINCT',MIN:'MIN',MAX:'MAX',MEDIAN:'MEDIAN'};
  const fn=aggMap[expr.aggregation]||'SUM';
  const closeParen=expr.aggregation==='COUNTD'?')':'';
  const aggExpr=`${fn}("${expr.measureField.toUpperCase()}"${closeParen})`;
  const filterClause=expr.filter?` WHERE ${expr.filter}`:'';
  if(expr.type==='fixed'){
    const groupCols=expr.dimensions.map(d=>`"${d.toUpperCase()}"`).join(', ');
    return `WITH ${alias}_cte AS (\n  SELECT ${groupCols},\n         ${aggExpr} AS "${alias.toUpperCase()}"\n  FROM ${cube}${filterClause}\n  GROUP BY ${groupCols}\n)\nSELECT base.*, t."${alias.toUpperCase()}"\nFROM (<base_query>) base\nLEFT JOIN ${alias}_cte t ON ${expr.dimensions.map(d=>`base."${d.toUpperCase()}" = t."${d.toUpperCase()}"`).join(' AND ')}`;
  }
  if(expr.type==='include'){
    const incCols=expr.dimensions.map(d=>`"${d.toUpperCase()}"`).join(', ');
    return `WITH ${alias}_inner AS (\n  SELECT <viz_dims>, ${incCols},\n         ${aggExpr} AS inner_val\n  FROM ${cube}${filterClause}\n  GROUP BY <viz_dims>, ${incCols}\n),\n${alias}_cte AS (\n  SELECT <viz_dims>, ${fn}(inner_val) AS "${alias.toUpperCase()}"\n  FROM ${alias}_inner\n  GROUP BY <viz_dims>\n)`;
  }
  const excCols=expr.dimensions.map(d=>`"${d.toUpperCase()}"`).join(', ');
  return `WITH ${alias}_cte AS (\n  SELECT <viz_dims minus [${expr.dimensions.join(', ')}]>,\n         ${aggExpr} AS "${alias.toUpperCase()}"\n  FROM ${cube}${filterClause}\n  GROUP BY <viz_dims minus ${excCols}>\n)`;
}

function openTableauImport(id){S.modal={t:'tableau-preview',id};R()}

function resolveTableauDs(importId,dsIndex,targetDsId){
  const imp=TABLEAU_IMPORTS.find(t=>t.id===importId);
  if(!imp||!imp.parse||!imp.parse.dataSources[dsIndex])return;
  imp.parse.dataSources[dsIndex].resolved=true;
  imp.parse.dataSources[dsIndex].mappedTo=targetDsId;
  toast('Connection resolved');
  R();
}

function remapWorksheet(importId,wsIndex,newChartType){
  const imp=TABLEAU_IMPORTS.find(t=>t.id===importId);
  if(!imp||!imp.parse)return;
  imp.parse.worksheets[wsIndex].chartType=newChartType;
  imp.parse.worksheets[wsIndex].mapped=newChartType;
  toast('Chart type remapped');
  R();
}

function commitTableauImport(importId){
  const imp=TABLEAU_IMPORTS.find(t=>t.id===importId);
  if(!imp||!imp.parse)return;
  const unresolved=imp.parse.dataSources.filter(d=>!d.resolved).length;
  if(unresolved>0){toast('⚠ Resolve all '+unresolved+' data source(s) first');return;}
  const newDashId='DASH_IMPORTED_'+Date.now();
  const newDash={id:newDashId,nm:imp.originalName.replace('.twbx',''),ds:'Imported from Tableau on '+new Date().toISOString().slice(0,10),ownerId:S.user.id,ownerNm:S.user.n,st:'DRAFT',v:1,tg:'tableau-import',widgets:imp.parse.worksheets.length};
  DA.unshift(newDash);
  imp.dashId=newDashId;
  S.modal=null;
  toast('✓ Workbook created — '+imp.parse.worksheets.length+' widgets · review in Dashboards');
  nav('dashboards');
}

        <div style="padding:10px;background:var(--accent-lt);border-radius:6px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Data sources</div><div style="font-size:22px;font-weight:700;color:var(--accent)">${p.dataSources.length}</div><div style="font-size:10px;color:${unresolved>0?'var(--warm)':'var(--emerald)'}">${unresolved>0?'⚠ '+unresolved+' unresolved':'✓ all resolved'}</div></div>
        <div style="padding:10px;background:var(--violet-lt);border-radius:6px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Worksheets</div><div style="font-size:22px;font-weight:700;color:var(--violet)">${p.worksheets.length}</div><div style="font-size:10px;color:var(--emerald)">✓ all mapped</div></div>
        <div style="padding:10px;background:var(--emerald-lt);border-radius:6px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Calc fields</div><div style="font-size:22px;font-weight:700;color:var(--emerald)">${p.calculatedFields.length}</div><div style="font-size:10px;color:var(--emerald)">✓ ${p.calculatedFields.filter(c=>c.translated).length} translated</div></div>
        <div style="padding:10px;background:var(--amber-lt);border-radius:6px"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">LOD expressions</div><div style="font-size:22px;font-weight:700;color:var(--warm)">${p.lodExpressions.length}</div><div style="font-size:10px;color:var(--emerald)">✓ ${p.lodExpressions.filter(l=>l.translated).length} translated</div></div>
      </div>

      ${imp.warnings&&imp.warnings.length>0?`<div style="padding:10px 12px;background:var(--amber-lt);border-left:3px solid var(--warm);border-radius:4px;margin-bottom:14px;font-size:11px">
        <b style="color:var(--warm)">⚠ Import warnings (${imp.warnings.length})</b>
        <ul style="margin:4px 0 0 16px;color:var(--muted)">${imp.warnings.map(w=>`<li>${w}</li>`).join('')}</ul>
      </div>`:''}

      <div style="font-weight:700;font-size:13px;margin:18px 0 8px">Step 4 — Data sources (resolve connections)</div>
      <table class="dt">
        <thead><tr><th>Tableau datasource</th><th>Type</th><th>Server / DB</th><th>Tables</th><th>Map to NexusBI</th><th>Status</th></tr></thead>
        <tbody>
          ${p.dataSources.map((ds,idx)=>`<tr>
            <td><b>${ds.name}</b></td>
            <td><span class="bdg bdg-in">${ds.connectionType}</span></td>
            <td style="font-family:monospace;font-size:10px">${ds.server||'—'}/${ds.database||'—'}</td>
            <td style="font-size:11px;color:var(--muted)">${ds.tables.join(', ')}</td>
            <td>
              ${ds.resolved?`<b style="color:var(--emerald);font-size:11px">${DS.find(d=>d.id===ds.mappedTo)?DS.find(d=>d.id===ds.mappedTo).nm:ds.mappedTo}</b>`:`<select onchange="if(this.value)resolveTableauDs('${imp.id}',${idx},this.value)" style="padding:4px 8px;border:1px solid var(--warm);border-radius:4px;font-size:11px;background:var(--paper)"><option value="">— pick data source —</option>${dsOptions}</select>`}
            </td>
            <td>${ds.resolved?'<span class="bdg bdg-ok">✓ Resolved</span>':'<span class="bdg bdg-wn">Pending</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table>

      <div style="font-weight:700;font-size:13px;margin:24px 0 8px">Step 5a — Worksheets (${p.worksheets.length}) · chart-type mapping</div>
      <table class="dt">
        <thead><tr><th>Worksheet name</th><th>Tableau viz</th><th></th><th>NexusBI chart</th><th>Dimensions</th><th>Measures</th><th>Status</th></tr></thead>
        <tbody>${p.worksheets.map((ws,i)=>worksheetRow(ws,i)).join('')}</tbody>
      </table>

      ${p.calculatedFields.length>0?`<div style="font-weight:700;font-size:13px;margin:24px 0 8px">Step 5b — Calculated fields (${p.calculatedFields.length}) · syntax translation</div>
      <table class="dt">
        <thead><tr><th>Name</th><th>Type</th><th>Tableau formula</th><th>NexusBI compiled SQL</th><th>Status</th></tr></thead>
        <tbody>${p.calculatedFields.map(c=>`<tr>
          <td><b>${c.name}</b></td>
          <td><span class="bdg bdg-in">${c.dataType}</span></td>
          <td style="font-family:monospace;font-size:10px;color:var(--violet);max-width:240px;word-break:break-all">${c.formula}</td>
          <td style="font-family:monospace;font-size:10px;color:var(--accent);max-width:280px;word-break:break-all">${c.convertedSql||'—'}</td>
          <td>${c.translated?'<span class="bdg bdg-ok">✓ Translated</span>':'<span class="bdg bdg-er">✗ Failed</span>'}</td>
        </tr>`).join('')}</tbody>
      </table>`:''}

      ${p.lodExpressions.length>0?`<div style="font-weight:700;font-size:13px;margin:24px 0 8px">Step 5c — LOD expressions (${p.lodExpressions.length})</div>
      <table class="dt">
        <thead><tr><th>Original Tableau LOD</th><th>NexusBI LOD</th><th>Status</th></tr></thead>
        <tbody>${p.lodExpressions.map(l=>`<tr>
          <td style="font-family:monospace;font-size:11px;color:var(--violet)">${l.original}</td>
          <td style="font-family:monospace;font-size:11px;color:var(--accent)">${l.converted}</td>
          <td>${l.translated?'<span class="bdg bdg-ok">✓ Translated</span>':'<span class="bdg bdg-er">✗ Failed</span>'}</td>
        </tr>`).join('')}</tbody>
      </table>`:''}

      ${p.parameters.length>0?`<div style="font-weight:700;font-size:13px;margin:24px 0 8px">Step 5d — Parameters (${p.parameters.length})</div>
      <table class="dt">
        <thead><tr><th>Name</th><th>Data type</th><th>Current value</th></tr></thead>
        <tbody>${p.parameters.map(pm=>`<tr><td><b>${pm.name}</b></td><td><span class="bdg bdg-in">${pm.dataType}</span></td><td style="font-family:monospace;font-size:11px">${pm.currentValue||'—'}</td></tr>`).join('')}</tbody>
      </table>`:''}

      ${p.dashboardLayout?`<div style="font-weight:700;font-size:13px;margin:24px 0 8px">Step 5e — Dashboard layout preserved (${p.dashboardLayout.width}×${p.dashboardLayout.height}, ${p.dashboardLayout.zones.length} zones)</div>
      <div style="position:relative;width:100%;height:240px;background:var(--sunk);border:1px solid var(--line);border-radius:6px;overflow:hidden">
        ${p.dashboardLayout.zones.map((z,i)=>{const xp=100*z.x/12,yp=100*z.y/12,wp=100*z.w/12,hp2=100*z.h/12;const colors=['var(--accent)','var(--violet)','var(--emerald)','var(--warm)'];const c=colors[i%4];return`<div style="position:absolute;left:${xp}%;top:${yp}%;width:${wp}%;height:${hp2}%;background:${c};opacity:0.22;border:1.5px solid ${c};border-radius:3px;padding:4px;overflow:hidden"><div style="font-size:9px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${z.worksheetName}</div><div style="font-size:8px;color:var(--muted);margin-top:1px">${z.w}×${z.h}</div></div>`}).join('')}
      </div>`:''}

      <div style="margin-top:24px;padding:12px;background:${imp.dashId?'var(--emerald-lt)':'var(--accent-lt)'};border-radius:6px;border-left:3px solid ${imp.dashId?'var(--emerald)':'var(--accent)'}">
        <b>${imp.dashId?'✓ Step 6 complete — Imported to':'Step 6 — Commit import'}</b>
        ${imp.dashId?`<br><span style="font-size:12px;color:var(--muted)">Dashboard ID: <span style="font-family:monospace">${imp.dashId}</span> · ${imp.widgetsCreated} widgets created</span>`:`<div style="font-size:11px;color:var(--muted);margin-top:4px">This will create a new NexusBI workbook containing ${p.worksheets.length} worksheets, ${p.calculatedFields.length} calc fields, ${p.lodExpressions.length} LOD expressions, and 1 dashboard with the above layout. Original .twbx is retained in NB_TABLEAU_IMPORTS for audit.</div>`}
      </div>
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
      <button class="btn bg bs" onclick="S.modal=null;R()">Close</button>
      ${imp.dashId?`<button class="btn bv bs" onclick="S.modal=null;nav('dashboards')">Open Dashboards →</button>`:`<button class="btn" ${unresolved>0?'disabled style="opacity:0.5;cursor:not-allowed"':''} onclick="commitTableauImport('${imp.id}')">${unresolved>0?'⚠ Resolve '+unresolved+' connection(s) first':'✓ Create Workbook ('+p.worksheets.length+' widgets)'}</button>`}
    </div>`;
}

// ═══ ROUTER ═══
function R(){const a=document.getElementById('app');let h='';const p=S.page;
if(!S.user||p==='login')h=rLogin();
else if(p==='home')h=`<div class="shell">${rHome()}</div>`;
else if(p==='datasources')h=`<div class="shell">${rDS()}</div>`;
else if(p==='flows')h=`<div class="shell">${rFlows()}</div>`;
else if(p.startsWith('flow-'))h=`<div class="shell">${rFlow(p.slice(5))}</div>`;
else if(p==='alerts')h=`<div class="shell">${rAlerts()}</div>`;
else if(p==='subscriptions')h=`<div class="shell">${rSubs()}</div>`;
else if(p==='admin-shapes')h=`<div class="shell">${rShapesAdmin()}</div>`;
else if(p==='workbooks')h=`<div class="shell">${rWorkbooks()}</div>`;
else if(p==='tableau-import')h=`<div class="shell">${rTableauImport()}</div>`;
else if(p.startsWith('wb-'))h=`<div class="shell">${rWBE(p.slice(3))}</div>`;
else if(p==='stories')h=`<div class="shell">${rStories()}</div>`;
else if(p==='dashboards')h=`<div class="shell">${rDash()}</div>`;
else if(p.startsWith('dv-'))h=`<div class="shell">${rDV(p.slice(3))}</div>`;
else if(p==='checker')h=`<div class="shell">${rChk()}</div>`;
else if(p==='lineage')h=`<div class="shell">${rLin()}</div>`;
else if(p==='explorer')h=`<div class="shell">${rExp()}</div>`;
else if(p==='semantic')h=`<div class="shell">${rSem()}</div>`;
else if(p==='admin-users')h=`<div class="shell">${rAU()}</div>`;
else if(p==='admin-audit')h=`<div class="shell">${rAA()}</div>`;
else if(p==='admin-webhooks')h=`<div class="shell">${sbar()}<div class="mn"><div class="pt">Webhooks</div><div class="g3" style="margin-top:16px"><div class="cd"><b>slack-notify</b> <span class="bdg bdg-ok">Active</span><div style="font-family:monospace;font-size:10px;color:var(--muted);margin:4px 0">hooks.slack.com</div><div style="font-size:11px;color:var(--emerald)">APPROVAL · 247 sent</div></div><div class="cd"><b>pagerduty</b> <span class="bdg bdg-ok">Active</span><div style="font-family:monospace;font-size:10px;color:var(--muted);margin:4px 0">events.pagerduty.com</div><div style="font-size:11px;color:var(--emerald)">ALERT · 14 sent</div></div></div></div></div>`;
else if(p==='admin-preagg')h=`<div class="shell">${sbar()}<div class="mn"><div class="pt">Pre-Aggregations</div><div class="cd" style="margin-top:16px;border-left:3px solid var(--amber)"><b>Orders cube</b> <span class="bdg bdg-ol">87% confidence</span><br>1,247 queries · 892ms avg<br><button class="btn bs" style="margin-top:8px" onclick="toast('Applied!')">Apply →</button></div></div></div>`;
else h=`<div class="shell">${sbar()}<div class="mn"><div class="pt">Page: ${p}</div></div></div>`;
h+=rModal();
if(S.toast)h+=`<div class="ts">${S.toast}</div>`;
a.innerHTML=h;
}
R();
</script>
</body>
</html>
