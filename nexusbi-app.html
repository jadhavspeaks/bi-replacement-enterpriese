// ── SVG Charts ──
function svgBar(cats,vals,color,w,h){
  const mx=Math.max(...vals)||1,pad=40,bw=Math.min(36,(w-pad-10)/cats.length*.7),gap=(w-pad-10)/cats.length;
  let bars='',labels='';
  cats.forEach((c,i)=>{
    const bh=(vals[i]/mx)*(h-50);const x=pad+i*gap+gap/2-bw/2;const y=h-30-bh;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="2"><title>${c}: ${vals[i]}</title></rect>`;
    labels+=`<text x="${pad+i*gap+gap/2}" y="${h-10}" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui">${c}</text>`;
  });
  const gridLines=[0,.25,.5,.75,1].map(p=>{const y=h-30-(h-50)*p;const v=Math.round(mx*p);return`<line x1="${pad}" y1="${y}" x2="${w}" y2="${y}" stroke="#e5e7eb" stroke-width="0.5"/><text x="${pad-4}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9" font-family="system-ui">${v>=1000?(v/1000).toFixed(0)+'K':v}</text>`}).join('');
  return`<svg class="ch" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${gridLines}${bars}${labels}</svg>`;
}
function svgLine(cats,vals,color,w,h){
  const mx=Math.max(...vals)||1,mn=Math.min(...vals),pad=45,ch=h-55;
  const pts=cats.map((c,i)=>{const x=pad+i*((w-pad-10)/(cats.length-1||1));const y=15+ch-(((vals[i]-mn)/(mx-mn||1))*ch);return{x,y,c,v:vals[i]}});
  const polyline=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area=`${pts[0].x},${h-30} ${polyline} ${pts[pts.length-1].x},${h-30}`;
  let labels=pts.map(p=>`<text x="${p.x}" y="${h-10}" text-anchor="middle" fill="#6b7280" font-size="10" font-family="system-ui">${p.c}</text>`).join('');
  let dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5"><title>${p.c}: ${p.v}</title></circle>`).join('');
  const gridLines=[0,.25,.5,.75,1].map(p=>{const y=15+ch-ch*p;const v=(mn+(mx-mn)*p).toFixed(1);return`<line x1="${pad}" y1="${y}" x2="${w}" y2="${y}" stroke="#e5e7eb" stroke-width="0.5"/><text x="${pad-4}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9" font-family="system-ui">${v}</text>`}).join('');
  return`<svg class="ch" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${gridLines}<polygon points="${area}" fill="${color}" opacity="0.1"/><polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}
function svgMulti(cats,series,w,h){
  const all=series.flatMap(s=>s.v);const mx=Math.max(...all)||1,mn=Math.min(...all),pad=50,ch=h-55;
  const colors=['#1e40af','#c2410c','#047857'];
  let out='';
  const gridLines=[0,.25,.5,.75,1].map(p=>{const y=15+ch-ch*p;const v=Math.round(mn+(mx-mn)*p);return`<line x1="${pad}" y1="${y}" x2="${w}" y2="${y}" stroke="#e5e7eb" stroke-width="0.5"/><text x="${pad-4}" y="${y+3}" text-anchor="end" fill="#9ca3af" font-size="9" font-family="system-ui">${v>=1000?(v/1000).toFixed(0)+'K':v}</text>`}).join('');
  out+=gridLines;
  series.forEach((s,si)=>{
    const cl=colors[si%3];
    const pts=cats.map((c,i)=>{const x=pad+i*((w-pad-10)/(cats.length-1));const y=15+ch-(((s.v[i]-mn)/(mx-mn||1))*ch);return{x,y}});
    out+=`<polyline points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="${cl}" stroke-width="2" stroke-linecap="round"/>`;
    pts.forEach(p=>{out+=`<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="${cl}"/>`});
  });
  let labels=cats.map((c,i)=>`<text x="${pad+i*((w-pad-10)/(cats.length-1))}" y="${h-10}" text-anchor="middle" fill="#6b7280" font-size="9" font-family="system-ui">${c}</text>`).join('');
  let legend=series.map((s,i)=>`<rect x="${pad+i*100}" y="2" width="12" height="3" rx="1" fill="${colors[i%3]}"/><text x="${pad+14+i*100}" y="7" fill="#6b7280" font-size="9" font-family="system-ui">${s.n}</text>`).join('');
  return`<svg class="ch" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${legend}${out}${labels}</svg>`;
}
